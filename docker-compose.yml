services:

  frontend:
    image: agripriceacr.azurecr.io/agriprice-frontend:latest
    container_name: agriprice_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agriprice-network

  backend:
    image: agripriceacr.azurecr.io/agriprice-backend:latest
    container_name: agriprice_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/agriprice
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    networks:
      - agriprice-network

  mongo:
    image: mongo:6
    container_name: agriprice-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - agriprice-network

volumes:
  mongo-data:

networks:
  agriprice-network:
    driver: bridge