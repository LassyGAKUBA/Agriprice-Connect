
- name: Final Configure Agriprice VM
  hosts: app
  become: yes

  tasks:
    - name: Install Docker and Compose V2
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: yes

    - name: Ensure docker-compose file is in place
      copy:
        src: ../docker-compose.yml
        dest: /home/azureuser/app/docker-compose.yml
        force: yes

    - name: Login to ACR
      shell: echo "{{ lookup('env','ACR_PASSWORD') }}" | docker login {{ lookup('env','ACR_LOGIN_SERVER') }} -u {{ lookup('env','ACR_USERNAME') }} --password-stdin

    - name: Stop existing containers
      shell: docker compose down
      args:
        chdir: /home/azureuser/app
      ignore_errors: yes

    - name: Pull latest images from ACR
      shell: docker compose pull
      args:
        chdir: /home/azureuser/app

    - name: Start containers with latest images
      shell: docker compose up -d
      args:
        chdir: /home/azureuser/app