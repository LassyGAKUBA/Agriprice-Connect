name: Security Scan

on:
  workflow_call:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (needed for scan)
        run: docker build -f frontend/Dockerfile -t agriprice-connect .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agriprice-connect
          severity: CRITICAL
          exit-code: 0