name: CD Pipeline

on:
  push:
    branches:
      - main   # 👈 ONLY runs after merge

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -f frontend/Dockerfile -t agriprice-connect .

      - name: Simulate Deployment
        run: echo "App deployed successfully!"