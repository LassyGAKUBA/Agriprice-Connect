name: Deploy to Production

on:
  push:
    branches:
      - main   # Only after merge

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint || echo "No lint issues"

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -f frontend/Dockerfile -t agriprice-connect:${{ github.sha }} .

      - name: Deploy application
        run: echo " Deploying version ${{ github.sha }}"