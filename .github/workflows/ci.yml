name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup:
    uses: ./.github/workflows/setup.yml

  test:
    needs: setup
    uses: ./.github/workflows/test.yml

  docker:
    needs: test
    uses: ./.github/workflows/docker.yml

  security:
    needs: docker
    uses: ./.github/workflows/security.yml