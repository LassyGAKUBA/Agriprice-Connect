name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Basic Test
        run: echo "Basic test passed"

      - name: Build Docker Image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t crop-price-tracker .
          else
            echo "Dockerfile not found, skipping build"
          fi