name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show repo structure
        run: ls -R

      - name: Run basic tests
        run: |
          echo "Running repository checks..."
          ls -R .
          echo "Tests passed"

      - name: Build Docker images
        run: docker compose build