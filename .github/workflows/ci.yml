name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/ci-pipeline", "test/ci-failure" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Info
        run: echo "Running CI for Agriprice Connect"

      - name: Build Docker images
        run: docker compose build