name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/ci-pipeline" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 🔹 Backend
      - name: Backend - Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Backend - Run tests (Template)
        uses: ./pipelines/templates/test.yml

      # 🔹 Frontend
      - name: Frontend - Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Frontend - Build (Template)
        uses: ./pipelines/templates/build.yml

      # 🔹 Docker
      - name: Build Docker images
        run: docker compose build