name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Check HTML files
        run: echo "HTML check passed"

      - name: Check CSS files
        run: echo "CSS check passed"

      - name: Run basic test
        run: echo "Basic test successful"

      - name: Build Docker Image
        run: docker build -t crop-price-tracker .